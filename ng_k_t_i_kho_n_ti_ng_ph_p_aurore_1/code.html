<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký tài khoản - Tiếng Pháp Aurore</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a0ac2",
                        "background-light": "#f5f5f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .vintage-glow {
            background: radial-gradient(circle at 50% 50%, #222249 0%, #101022 100%);
        }
        .glass-card {
            background: rgba(24, 24, 52, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(49, 49, 104, 0.5);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col group/design-root overflow-x-hidden">
<!-- TopNavBar -->
<header class="w-full border-b border-solid border-b-[#222249] bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="max-w-[1200px] mx-auto px-6 h-20 flex items-center justify-between">
<div class="flex items-center gap-4 text-white">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_330)">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</g>
<defs>
<clippath id="clip0_6_330"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
<h2 class="text-white text-xl font-bold leading-tight tracking-[-0.015em]">Tiếng Pháp Aurore</h2>
</div>
<div class="hidden md:flex items-center gap-8">
<nav class="flex items-center gap-9">
<a class="text-white/80 hover:text-white text-sm font-medium transition-colors" href="#">Khóa học</a>
<a class="text-white/80 hover:text-white text-sm font-medium transition-colors" href="#">Giới thiệu</a>
<a class="text-white/80 hover:text-white text-sm font-medium transition-colors" href="#">Tài liệu</a>
</nav>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-xl h-11 px-6 bg-primary text-white text-sm font-bold transition-all hover:brightness-110">
                    Đăng nhập
                </button>
</div>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 vintage-glow relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-20 left-10 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[120px] text-white">castle</span>
</div>
<div class="absolute bottom-20 right-10 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[120px] text-white">menu_book</span>
</div>
<div class="layout-content-container flex flex-col max-w-[520px] w-full flex-1">
<div class="glass-card rounded-xl p-8 md:p-12 shadow-2xl relative">
<!-- HeadlineText & BodyText -->
<div class="text-center mb-10">
<span class="material-symbols-outlined text-primary text-4xl mb-4">auto_awesome</span>
<h1 class="text-white tracking-light text-[32px] font-bold leading-tight pb-3">Tham gia cùng Tiếng Pháp Aurore</h1>
<p class="text-[#9090cb] text-base font-normal leading-normal">Bắt đầu hành trình chinh phục tiếng Pháp của bạn ngay hôm nay.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-white text-sm font-medium pb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">person</span> Họ và tên
                            </p>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#313168] bg-[#181834]/50 focus:border-primary h-14 placeholder:text-[#9090cb]/50 px-5 text-base font-normal" placeholder="Nhập họ và tên của bạn" type="text"/>
</label>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-white text-sm font-medium pb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">mail</span> Email
                            </p>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#313168] bg-[#181834]/50 focus:border-primary h-14 placeholder:text-[#9090cb]/50 px-5 text-base font-normal" placeholder="example@email.com" type="email"/>
</label>
</div>
<!-- Phone Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-white text-sm font-medium pb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">call</span> Số điện thoại
                            </p>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#313168] bg-[#181834]/50 focus:border-primary h-14 placeholder:text-[#9090cb]/50 px-5 text-base font-normal" placeholder="090 123 4567" type="tel"/>
</label>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-white text-sm font-medium pb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">lock</span> Mật khẩu
                            </p>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#313168] bg-[#181834]/50 focus:border-primary h-14 placeholder:text-[#9090cb]/50 px-5 text-base font-normal" placeholder="••••••••" type="password"/>
</label>
</div>
<!-- Checkbox -->
<div class="flex items-center gap-3 px-1 py-2">
<input class="size-5 rounded border-[#313168] bg-[#181834] text-primary focus:ring-primary focus:ring-offset-[#101022]" id="terms" type="checkbox"/>
<label class="text-[#9090cb] text-sm cursor-pointer select-none" for="terms">
                            Tôi đồng ý với <a class="text-primary hover:underline" href="#">điều khoản sử dụng</a>
</label>
</div>
<!-- Primary CTA -->
<button class="w-full flex items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold tracking-wide transition-all hover:scale-[1.01] hover:shadow-lg hover:shadow-primary/20 mt-4" type="submit">
                        Đăng ký ngay
                    </button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-[#9090cb] text-sm">
                        Đã có tài khoản? 
                        <a class="text-white font-semibold hover:text-primary transition-colors underline underline-offset-4 ml-1" href="#">Đăng nhập</a>
</p>
</div>
<!-- Decorative Corner Icon -->
<div class="absolute top-4 right-4 text-primary/30">
<span class="material-symbols-outlined text-xl">history_edu</span>
</div>
</div>
</div>
</main>
<footer class="w-full py-8 px-6 border-t border-t-[#222249] bg-background-dark text-center">
<p class="text-[#9090cb] text-xs">© 2024 Tiếng Pháp Aurore. Tất cả các quyền được bảo lưu.</p>
</footer>
</body></html>
